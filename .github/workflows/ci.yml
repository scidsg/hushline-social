name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Shell syntax check
        run: |
          bash -n \
            scripts/check_launchd_prereqs.sh \
            scripts/install_launch_agent.sh \
            scripts/push_previous_posts_archive.sh \
            scripts/agent_daily_social_planner.sh \
            scripts/agent_daily_linkedin_publisher.sh \
            scripts/run_daily_planner_launchd.sh \
            scripts/run_daily_linkedin_launchd.sh

      - name: Lint launchd plists
        run: |
          plutil -lint \
            deploy/launchd/com.hushline.social.daily-planner.plist \
            deploy/launchd/com.hushline.social.linkedin.daily.plist \
            deploy/launchd/com.hushline.social.daily-planner.daemon.plist \
            deploy/launchd/com.hushline.social.linkedin.daily.daemon.plist

      - name: Node smoke checks
        run: |
          node --check scripts/check-docs-drift.js
          node --check scripts/publish-daily-linkedin.js
          node --check scripts/plan-day.js
          node --check scripts/validate-day-plan.js
          node --check scripts/lib/daily-planner.js
          node --check scripts/lib/social-common.js

      - name: Docs drift check
        run: npm run check:docs-drift
