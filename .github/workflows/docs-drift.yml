name: Docs Drift

on:
  pull_request:
    paths:
      - README.md
      - AGENTS.md
      - package.json
      - scripts/check-docs-drift.js
      - deploy/launchd/*.plist
  push:
    branches:
      - main
    paths:
      - README.md
      - AGENTS.md
      - package.json
      - scripts/check-docs-drift.js
      - deploy/launchd/*.plist

jobs:
  docs-drift:
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify docs and schedules stay in sync
        run: npm run check:docs-drift
