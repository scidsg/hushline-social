<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hush Line Verified User Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #dcdcdc;
      font-family: Inter, Arial, Helvetica, sans-serif;
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    h1 {
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-weight: 700;
      font-style: normal;
      margin: 0 0 12px 0;
      font-size: 3.5rem;
      line-height: 1;
      color: #4f168a;
    }

    p {
      line-height: 1.4;
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.4;
      font-weight: 400;
      color: #5f5f5f;
    }

    h1,
    p.subtext {
      max-width: 480px;
    }

    .canvas {
      position: relative;
      width: 1024px;
      height: 768px;
      overflow: hidden;
      background: #faf4ff;
    }

    /* top-right angled background shapes */
    .bg-shape-1,
    .bg-shape-2 {
      position: absolute;
      width: 1420px;
      height: 1420px;
      border-radius: 100vw;
      pointer-events: none;
    }

    .bg-shape-1 {
      background: #4f168a;
      left: 580px;
      top: -300px;
    }

    .bg-shape-2 {
      background: #4f168a;
      left: 575px;
      top: -160px;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 60% 40%;
      width: 100%;
      height: 100%;
      padding: 54px 62px 42px 70px;
      gap: 36px;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 10px;
      padding-bottom: 3rem;
    }

    .footer-badge {
      position: absolute;
      left: 72px;
      bottom: 48px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: #4f168a;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .footer-badge img {
      width: 64px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-panel {
      width: 320px;
      height: 640px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 14px;
    }

    .phone-panel img {
      width: 100%;
      height: auto;
      display: block;
      position: relative;
      left: 0;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 1);
      color: #7D25C1;
      font-size: 1rem;
      font-weight: 700;
      padding: 3px 12px 6px 12px;
      border-radius: 9999px;
      margin-bottom: 24px;
      border: 1px solid #7D25C1;
      width: fit-content;
    }
    .user-link {
      margin-top: 18px;
      font-size: 18px;
      color: #7D25C1;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-shape-1"></div>

    <div class="layout">
      <section class="left">
        <h1 class="headline">Verified User Name</h1>
        <span class="badge">⭐️ Verified</span>
        <p class="subtext">
          Short verified-user bio goes here. This is placeholder copy for the
          template only and will be replaced at render time.
        </p>
        <p class="user-link">https://tips.hushline.app/to/verified-user</p>
      </section>

      <section class="right">
        <div class="phone-panel">
          <img src="assets/example-qr.svg" alt="QR code for the verified user URL" />
        </div>
      </section>
    </div>

    <div class="footer-badge">
      <img src="https://hushline.app/assets/img/social/logo-tips.png" alt="" />
      <span>Sign up at hushline.app!</span>
    </div>
  </div>
</body>
</html>
